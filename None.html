<script>
let slideIndex = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(index) {
  slides.forEach((slide, i) => {
    slide.style.display = "none";
    dots[i].classList.remove("active");
  });

  slides[index].style.display = "block";
  dots[index].classList.add("active");
}

function nextSlide() {
  slideIndex = (slideIndex + 1) % slides.length;
  showSlide(slideIndex);
}

// Manual control (arrows)
document.querySelector(".prev").addEventListener("click", () => {
  slideIndex = (slideIndex - 1 + slides.length) % slides.length;
  showSlide(slideIndex);
});

document.querySelector(".next").addEventListener("click", () => {
  slideIndex = (slideIndex + 1) % slides.length;
  showSlide(slideIndex);
});

// Dot control
dots.forEach((dot, i) => {
  dot.addEventListener("click", () => {
    slideIndex = i;
    showSlide(slideIndex);
  });
});

// Auto-slide every 4 seconds
setInterval(nextSlide, 9000);

// Start by showing the first slide
showSlide(slideIndex);
</script>

<script> filterSelection("all")
function filterSelection(c) {
  var x, i;
  x = document.getElementsByClassName("filterDiv");
  if (c == "all") c = "";
  // Add the "show" class (display:block) to the filtered elements, and remove the "show" class from the elements that are not selected
  for (i = 0; i < x.length; i++) {
    w3RemoveClass(x[i], "show");
    if (x[i].className.indexOf(c) > -1) w3AddClass(x[i], "show");
  }
}

// Show filtered elements
function w3AddClass(element, name) {
  var i, arr1, arr2;
  arr1 = element.className.split(" ");
  arr2 = name.split(" ");
  for (i = 0; i < arr2.length; i++) {
    if (arr1.indexOf(arr2[i]) == -1) {
      element.className += " " + arr2[i];
    }
  }
}

// Hide elements that are not selected
function w3RemoveClass(element, name) {
  var i, arr1, arr2;
  arr1 = element.className.split(" ");
  arr2 = name.split(" ");
  for (i = 0; i < arr2.length; i++) {
    while (arr1.indexOf(arr2[i]) > -1) {
      arr1.splice(arr1.indexOf(arr2[i]), 1);
    }
  }
  element.className = arr1.join(" ");
}

// Add active class to the current control button (highlight it)
var header = document.getElementById("btn-group");
var btns = header.getElementsByClassName("btn");
for (var i = 0; i < btns.length; i++) {
  btns[i].addEventListener("click", function() {
  var current = document.getElementsByClassName("active");
  current[0].className = current[0].className.replace(" active", "");
  this.className += " active";
  });
}</script>

<script>
  document.querySelectorAll('.btn-group .btn').forEach(button => {

<script>
document.addEventListener("DOMContentLoaded", () => {
  const sections = [
    { id: "home", navId: "text1" },
    { id: "slide2", navId: "text2" },
    { id: "slide1", navId: "text3" } // adjust if ABOUT section has a unique ID
  ];

  const navLinks = sections.map(({ navId }) => document.getElementById(navId));
  let currentSectionIndex = 0;

  const setActive = (index) => {
    navLinks.forEach((link, i) => {
      if (i === index) {
        link.style.fontWeight = "bold";
      } else {
        link.style.fontWeight = "normal";
      }
    });
  };

  const sectionOffsets = () => sections.map(({ id }) => {
    const el = document.getElementById(id);
    return el ? el.offsetTop : 0;
  });

  window.addEventListener("scroll", () => {
    const scrollPosition = window.scrollY + window.innerHeight / 2;
    const offsets = sectionOffsets();

    for (let i = 0; i < offsets.length; i++) {
      const next = offsets[i + 1] || Infinity;
      if (scrollPosition >= offsets[i] && scrollPosition < next) {
        if (currentSectionIndex !== i) {
          currentSectionIndex = i;
          setActive(i);
        }
        break;
      }
    }
  });
});
</script>
